<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wes</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wes">
<link rel="apple-touch-icon" href="icon-192.png">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none';">
<meta name="description" content="專為孩子設計的 AI 對話夥伴，用好奇心陪伴成長。">
<meta property="og:title" content="Wes">
<meta property="og:description" content="專為孩子設計的 AI 對話夥伴，用好奇心陪伴成長。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bjdisk.github.io/eduai-wesley/">
<meta property="og:image" content="https://bjdisk.github.io/eduai-wesley/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --surface: #162030;
    --surface2: #1e2d40;
    --accent: #5b9bd5;
    --accent2: #7ec8a0;
    --accent3: #f0c05a;
    --text: #e8f0f8;
    --text-dim: #7a9ab8;
    --bubble-wes: #1e3a52;
    --bubble-wesley: #1a3d2e;
    --danger: #e05252;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 78%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 44% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 15%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    z-index: 100;
    gap: 24px;
  }

  #setup-screen .logo {
    font-family: 'Nunito', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -2px;
    text-shadow: 0 0 40px rgba(91,155,213,0.4);
  }

  #setup-screen .tagline {
    font-size: 15px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }

  #setup-screen input {
    width: 100%;
    max-width: 340px;
    background: var(--surface2);
    border: 1.5px solid rgba(91,155,213,0.3);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    color: var(--text);
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  #setup-screen input:focus { border-color: var(--accent); }
  #setup-screen input::placeholder { color: var(--text-dim); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #3a7bbf);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px 40px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(91,155,213,0.3);
  }

  .btn-primary:active { transform: scale(0.97); }

  /* ── iOS PWA 安裝提示 ── */
  #ios-install-banner {
    display: none;
    background: var(--surface2);
    border: 1px solid rgba(240,192,90,0.3);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    max-width: 340px;
    width: 100%;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
    position: relative;
  }

  #ios-install-banner .banner-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 4px;
    font-size: 14px;
  }

  #ios-install-banner .banner-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
  }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    flex-shrink: 0;
  }

  #wes-avatar {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: white;
    box-shadow: 0 0 20px rgba(91,155,213,0.3);
    flex-shrink: 0;
  }

  #wes-info { flex: 1; padding: 0 12px; }

  #wes-name {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
  }

  #wes-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #timer-display {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 0.3s, box-shadow 0.3s;
    user-select: none;
    -webkit-user-select: none;
  }

  /* 長按進行中：邊框漸亮，爸爸感受得到但 Wesley 不在意 */
  #timer-display.arming {
    box-shadow: 0 0 0 2px rgba(240,192,90,0.6);
    color: var(--accent3);
  }

  #timer-display.warning { color: var(--accent3); }
  #timer-display.danger { color: var(--danger); }

  #logout-btn {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  #logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Chat area */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chat-area::-webkit-scrollbar { width: 3px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.wes { align-self: flex-start; }
  .message.wesley { align-self: flex-end; }

  .message-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    padding: 0 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .message.wesley .message-label { text-align: right; }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 16px;
    line-height: 1.6;
    font-weight: 500;
  }

  .message.wes .bubble {
    background: var(--bubble-wes);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(91,155,213,0.15);
  }

  .message.wesley .bubble {
    background: var(--bubble-wesley);
    border-bottom-right-radius: 4px;
    border: 1px solid rgba(126,200,160,0.15);
    color: #d4f0e2;
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--bubble-wes);
    border: 1px solid rgba(91,155,213,0.15);
    padding: 16px 20px;
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
    width: fit-content;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── VOICE-FIRST INPUT ── */
  #input-area {
    padding: 16px 16px 28px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }

  /* ── 大語音按鈕 (96px，更適合小朋友手指) ── */
  #voice-btn {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #3a7bbf);
    color: white;
    font-size: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 28px rgba(91,155,213,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #voice-btn:active { transform: scale(0.93); }

  #voice-btn.listening {
    background: linear-gradient(135deg, #e05252, #c03030);
    box-shadow: 0 6px 28px rgba(224,82,82,0.5);
    animation: voicePulse 1s infinite;
  }

  #voice-btn.speaking {
    background: linear-gradient(135deg, var(--accent2), #4a9a70);
    box-shadow: 0 6px 28px rgba(126,200,160,0.5);
    animation: speakPulse 1.5s infinite;
  }

  @keyframes voicePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,82,82,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(224,82,82,0); }
  }

  @keyframes speakPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(126,200,160,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(126,200,160,0); }
  }

  /* 錄音中顯示即時字幕 */
  #interim-display {
    font-size: 13px;
    color: var(--accent3);
    font-weight: 600;
    min-height: 18px;
    max-width: 280px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-style: italic;
  }

  #interim-display.visible { opacity: 1; }

  #voice-hint {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.3px;
    height: 18px;
    transition: color 0.3s;
  }

  #voice-hint.active { color: var(--danger); }
  #voice-hint.speaking { color: var(--accent2); }

  /* Text mode toggle row */
  #text-toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  #toggle-text-btn {
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 8px 16px;
    color: var(--text-dim);
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }

  #toggle-text-btn.active {
    border-color: rgba(91,155,213,0.4);
    color: var(--accent);
  }

  #text-row {
    display: none;
    width: 100%;
    gap: 10px;
    align-items: flex-end;
  }

  #text-row.visible { display: flex; }

  #text-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid rgba(91,155,213,0.2);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #text-input:focus { border-color: rgba(91,155,213,0.5); }
  #text-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), #3a7bbf);
    color: white;
    font-size: 18px;
    box-shadow: 0 4px 16px rgba(91,155,213,0.3);
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  #send-btn:active { transform: scale(0.92); }

  #send-btn:disabled {
    background: var(--surface2);
    box-shadow: none;
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* Parent Panel */
  #parent-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    flex-direction: column;
    padding: 32px 24px;
    gap: 16px;
    backdrop-filter: blur(8px);
  }

  #parent-panel h2 {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent3);
    margin-bottom: 8px;
  }

  .parent-cmd-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .cmd-btn {
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, border-color 0.2s;
  }

  .cmd-btn:active { background: var(--surface); }

  .cmd-btn .cmd-label {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  #review-flags {
    flex: 1;
    overflow-y: auto;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .flag-item {
    background: rgba(224,82,82,0.1);
    border-left: 3px solid var(--danger);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text);
  }

  .flag-item .flag-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  #close-parent {
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    padding: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid rgba(240,192,90,0.3);
    color: var(--accent3);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .session-end-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 16px;
    font-style: italic;
  }

  .img-bubble {
    margin-top: 8px;
    border-radius: var(--radius);
    overflow: hidden;
    max-width: 200px;
    border: 1px solid rgba(91,155,213,0.15);
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="logo">Wes</div>
  <div class="tagline">Wesley 的朋友。</div>
  <button class="btn-primary" onclick="startApp()">開始</button>

  <!-- iOS PWA 安裝提示（只在 iOS + 非 standalone 時顯示） -->
  <div id="ios-install-banner">
    <button class="banner-close" onclick="this.parentElement.style.display='none'">✕</button>
    <div class="banner-title">📱 想安裝到平板桌面？</div>
    請用 <strong>Safari</strong> 開啟此頁面，<br>
    點選下方的 <strong>「分享」</strong> → <strong>「加入主畫面」</strong><br>
    <span style="font-size:11px;opacity:0.7">Chrome on iPad 不支援安裝，Safari 才可以。</span>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div id="header">
    <div id="wes-avatar">W</div>
    <div id="wes-info">
      <div id="wes-name">Wes</div>
      <div id="wes-status">
        <div class="status-dot"></div>
        <span id="status-text">在這裡</span>
      </div>
    </div>
    <div id="timer-display">15:00</div>
    <button id="logout-btn" onclick="logout()" title="清除 Key 並登出">⏏</button>
  </div>

  <div id="chat-area"></div>

  <div id="input-area">
    <!-- 主語音按鈕：96px，更適合小手 -->
    <button id="voice-btn" onclick="toggleVoice()">🎙️</button>
    <!-- 即時字幕（錄音中顯示聽到的內容） -->
    <div id="interim-display"></div>
    <div id="voice-hint">點一下說話</div>
    <div id="text-toggle-row">
      <button id="toggle-text-btn" onclick="toggleTextMode()">⌨️ 文字模式</button>
    </div>
    <div id="text-row">
      <textarea id="text-input" placeholder="輸入文字…" rows="1"
        oninput="autoResize(this); updateSendBtn()"
        onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>
</div>

<!-- Parent Panel -->
<div id="parent-panel">
  <h2>👨‍👦 父端控制台</h2>
  <div class="parent-cmd-grid">
    <button class="cmd-btn" onclick="sendParentCmd('PAUSE')">
      <div class="cmd-label">[PAUSE]</div>暫停引導，只陪伴
    </button>
    <button class="cmd-btn" onclick="promptTopic()">
      <div class="cmd-label">[TOPIC]</div>指定話題
    </button>
    <button class="cmd-btn" onclick="sendParentCmd('END')">
      <div class="cmd-label">[END]</div>自然結束 Session
    </button>
    <button class="cmd-btn" onclick="sendParentCmd('REVIEW')">
      <div class="cmd-label">[REVIEW]</div>本次摘要
    </button>
  </div>
  <div style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--danger);margin-top:4px;">
    ⚑ PARENT_REVIEW 標記
  </div>
  <div id="review-flags">
    <div style="color:var(--text-dim);font-size:13px;">本次尚無標記。</div>
  </div>
  <button id="close-parent" onclick="closeParentPanel()">關閉 ✕</button>
</div>

<div id="toast"></div>

<script>
// TTS Voice Preload - 解決 iOS getVoices() 非同步問題
let cachedVoices = [];
function loadVoices() {
  const v = window.speechSynthesis.getVoices();

// ── iOS PWA 安裝提示偵測 ──
// 條件：iOS + 不在 standalone 模式（尚未安裝）+ 非 Safari（用 Chrome）
(function detectIOSInstallHint() {
  const isIOS = /ipad|iphone|ipod/i.test(navigator.userAgent);
  const isStandalone = ('standalone' in navigator) && navigator.standalone;
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
  if (isIOS && !isStandalone) {
    const banner = document.getElementById('ios-install-banner');
    banner.style.display = 'block';
    // 如果是非 Safari（Chrome on iOS）強調一下
    if (!isSafari) {
      banner.style.borderColor = 'rgba(224,82,82,0.4)';
    }
  }
})();

// ── App Init ──
function startApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  // ── 預先暖機 TTS，觸發 iOS voiceschanged ──
  warmUpTTS();
  startSession();
}

function logout() {
  messages = [];
  sessionFlags = [];
  sessionActive = false;
  isWaitingForResponse = false;
  clearInterval(timerInterval);
  secondsLeft = 15 * 60;
  window.speechSynthesis && window.speechSynthesis.cancel();
  stopTTSKeepAlive();
  // 重置所有輸入介面狀態，確保下次登入不殘留 disabled
  const voiceBtn = document.getElementById('voice-btn');
  voiceBtn.disabled = false;
  voiceBtn.style.opacity = '';
  document.getElementById('send-btn').disabled = true; // 空輸入框，正確應為 disabled
  document.getElementById('text-input').disabled = false;
  document.getElementById('text-input').value = '';
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('timer-display').textContent = '15:00';
  document.getElementById('timer-display').className = '';
  document.getElementById('status-text').textContent = '在這裡';
}

function startSession() {
  sessionActive = true;
  startTimer();
  setTimeout(() => sendOpeningGreeting(), 600);
}

async function sendOpeningGreeting() {
  const response = await callClaude([{
    role: 'user',
    content: '（session開始，只給開場問候，一句話，不加任何圖片標記）'
  }]);
  if (response) {
    const clean = stripSystemTags(response).replace(/\[IMAGE:[^\]]*\]/gi, '').trim();
    checkForFlags(response, '開場');
    addMessage('wes', clean);
    setTimeout(() => speakText(clean), 400);
  }
}

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      sessionEnded();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.className = secondsLeft <= 60 ? 'danger' : secondsLeft <= 3*60 ? 'warning' : '';
}

function sessionEnded() {
  sessionActive = false;
  // 停用所有輸入介面
  const voiceBtn = document.getElementById('voice-btn');
  voiceBtn.disabled = true;
  voiceBtn.style.opacity = '0.4';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('text-input').disabled = true;

  const chat = document.getElementById('chat-area');
  function addEndMsg() {
    const msg = document.createElement('div');
    msg.className = 'session-end-msg';
    msg.textContent = '⏱ 今天的時間到了。';
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }
  addEndMsg();

  // 每分鐘重複提醒，最多 3 次
  let reminderCount = 0;
  const reminderInterval = setInterval(() => {
    reminderCount++;
    if (reminderCount >= 3) clearInterval(reminderInterval);
    showToast('今天的時間到囉！');
    addEndMsg();
  }, 60000);
}

// ── Claude API ──
async function callClaude(msgs) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 300000); // 5 分鐘 timeout
  try {
    document.getElementById('status-text').textContent = '思考中…';
    const res = await fetch('/api/chat', {
      method: 'POST',
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });
    clearTimeout(timeoutId);
    const data = await res.json();
    document.getElementById('status-text').textContent = '在這裡';
    if (data.text) return data.text;
    return null;
  } catch (e) {
    clearTimeout(timeoutId);
    document.getElementById('status-text').textContent = '在這裡';
    showToast(e.name === 'AbortError' ? '等太久了，請再試一次' : '連線失敗，請檢查網路');
    return null;
  }
}

// ── 統一 processing 鎖：同步鎖定/解鎖所有輸入介面 ──
function setProcessing(on) {
  isWaitingForResponse = on;
  const voiceBtn = document.getElementById('voice-btn');
  const textInput = document.getElementById('text-input');
  if (on) {
    if (!isListening) { voiceBtn.disabled = true; voiceBtn.style.opacity = '0.5'; }
    textInput.disabled = true;
  } else if (sessionActive) {
    voiceBtn.disabled = false;
    voiceBtn.style.opacity = '';
    textInput.disabled = false;
    updateSendBtn();
  }
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || isWaitingForResponse || !sessionActive) return;

  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();

  const cmdMatch = text.match(/\[(PAUSE|END|REVIEW|TOPIC:\s*.+|FLAG:\s*.+)\]/i);
  if (cmdMatch) {
    addMessage('wesley', text);
    await handleParentCommand(text);
    return;
  }

  addMessage('wesley', text);
  messages.push({ role: 'user', content: text });

  showTyping();
  setProcessing(true);
  try {
    const response = await callClaude(messages);
    if (response) {
      const { clean, query } = parseImageTag(stripSystemTags(response));
      checkForFlags(response, text);
      messages.push({ role: 'assistant', content: response });
      const imageData = query ? await fetchImage(query) : null;
      addMessage('wes', clean.trim(), imageData);
      speakText(clean.trim());
    }
  } finally {
    hideTyping();
    setProcessing(false);
  }
}

async function handleParentCommand(cmd) {
  showTyping();
  setProcessing(true);
  messages.push({ role: 'user', content: cmd });
  try {
    const response = await callClaude(messages);
    if (response) {
      const clean = stripSystemTags(response);
      messages.push({ role: 'assistant', content: response });
      addMessage('wes', clean);
    }
  } finally {
    hideTyping();
    setProcessing(false);
  }
}

// ── UI Helpers ──
function addMessage(role, text, imageData = null) {
  const chat = document.getElementById('chat-area');
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'wes' ? 'Wes' : 'Wesley';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrapper.appendChild(label);
  wrapper.appendChild(bubble);

  if (imageData && imageData.type === 'emoji') {
    const color = EMOJI_COLORS[Math.floor(Math.random() * EMOJI_COLORS.length)];
    const emojiEl = document.createElement('div');
    emojiEl.className = 'img-bubble';
    emojiEl.style.cssText = `
      background:${color};
      display:flex;align-items:center;justify-content:center;
      height:140px;font-size:88px;
      animation:fadeUp 0.4s ease;
    `;
    emojiEl.textContent = imageData.emoji;
    wrapper.appendChild(emojiEl);
  }

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

  const chat = document.getElementById('chat-area');

  typingEl.innerHTML = `

  chat.scrollTop = chat.scrollHeight;

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function checkForFlags(response, userMsg) {
  const flagMatch = response.match(/\[PARENT_REVIEW:([^\]]+)\]/);
  if (flagMatch) {
    const flag = {
      time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
      reason: flagMatch[1],
      context: userMsg.substring(0, 60)
    };
    sessionFlags.push(flag);
    updateFlagsPanel();
    showToast('⚑ 已標記');
  }
}

function updateFlagsPanel() {
  const el = document.getElementById('review-flags');
  if (sessionFlags.length === 0) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">本次尚無標記。</div>';
    return;
  }
  el.innerHTML = sessionFlags.map(f => `
    <div class="flag-item">
      <div class="flag-time">${f.time}</div>
      <strong>${f.reason}</strong><br>
      <span style="font-size:12px;opacity:0.7">${f.context}</span>
    </div>`).join('');
}

// ── Parent Panel ──
function openParentPanel() {
  document.getElementById('parent-panel').style.display = 'flex';
  updateFlagsPanel();
}

function closeParentPanel() {
  document.getElementById('parent-panel').style.display = 'none';
}

function sendParentCmd(cmd) {
  closeParentPanel();
  // 直接走 handleParentCommand，不經過 textarea，避免 toggle 時序問題
  addMessage('wesley', `[${cmd}]`);
  handleParentCommand(`[${cmd}]`);
}

function promptTopic() {
  closeParentPanel();
  const topic = prompt('引導 Wes 談什麼主題？');
  if (topic) {
    const cmdText = `[TOPIC: ${topic}]`;
    addMessage('wesley', cmdText);
    handleParentCommand(cmdText);
  }
}

function getEmojiForQuery(query) {
  const q = query.toLowerCase().trim();
  // 直接命中英文 key
  if (EMOJI_MAP[q]) return EMOJI_MAP[q];
  // 中文別名對照
  for (const [zh, en] of Object.entries(ZH_ALIAS)) {
    if (q.includes(zh) || zh.includes(q)) return EMOJI_MAP[en] || null;
  }
  // 英文模糊比對
  for (const [key, emoji] of Object.entries(EMOJI_MAP)) {
    if (q.includes(key) || key.includes(q)) return emoji;
  }
  return null;
}

function fetchImage(query) {
  const emoji = getEmojiForQuery(query);
  if (emoji) return Promise.resolve({ type: 'emoji', emoji });
  return Promise.resolve(null);
}

function stripSystemTags(text) {
  return text
    .replace(/\[PARENT_REVIEW[^\]]*\]/gi, '')
    .replace(/\[(PAUSE|END|REVIEW|TOPIC:[^\]]*|FLAG:[^\]]*)\]/gi, '')
    .trim();
}

function parseImageTag(text) {
  const match = text.match(/\[IMAGE:\s*([^\]]+)\]/i);
  if (match) {
    return { clean: text.replace(match[0], '').trim(), query: match[1].trim() };
  }
  return { clean: text, query: null };
}

// ══════════════════════════════════════════════════
// ── TTS — Web Speech API with iOS fix ──
//
// iOS 規則（Safari & Chrome on iOS 都適用）：
// 1. 第一次 speak() 必須在 user gesture call stack 內
// 2. 必須是非空內容，空字串會被 iOS 直接忽略
// 3. 一旦第一次解鎖，後續 async speak() 可正常運作
//
// iOS 長播 bug：speechSynthesis 約 15 秒後會靜默凍結
// 修法：每 10 秒 pause() + resume() 保持 audio session 活著
// ══════════════════════════════════════════════════
let isSpeaking = false;
let iosTTSKeepAlive = null;

function warmUpTTS() {
  if (!('speechSynthesis' in window)) return;

  // ★ 關鍵：必須用有內容的 utterance，空字串在 iOS 無效
  //   volume 設 0.01（幾乎無聲）來解鎖 audio session
  const u = new SpeechSynthesisUtterance('好');
  u.volume = 0.01;
  u.rate = 10;   // 超快速，幾乎無感知
  u.lang = 'zh-TW';
  window.speechSynthesis.speak(u);

  // 非 iOS 設備：監聽 voiceschanged 以確保清單載入
  if ('onvoiceschanged' in window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
}

// iOS 長播保活：避免 speechSynthesis 在 ~15 秒後靜默凍結
function startTTSKeepAlive() {
  stopTTSKeepAlive();
  iosTTSKeepAlive = setInterval(() => {
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 10000);
}

function stopTTSKeepAlive() {
  if (iosTTSKeepAlive) {
    clearInterval(iosTTSKeepAlive);
    iosTTSKeepAlive = null;
  }
}

function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  return (
    voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) ||
    voices.find(v => v.lang === 'zh-TW') ||
    voices.find(v => v.lang.startsWith('zh')) ||
    null
  );
}

function setTTSSpeaking(on) {
  isSpeaking = on;
  const btn = document.getElementById('voice-btn');
  const hint = document.getElementById('voice-hint');
  if (on) {
    btn.classList.add('speaking');
    btn.textContent = '🔊';
    hint.textContent = 'Wes 說話中…';
    hint.className = 'speaking';
  } else {
    btn.classList.remove('speaking');
    btn.textContent = '🎙️';
    hint.textContent = '點一下說話';
    hint.className = '';
  }
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const cleanText = text
    .replace(/\[IMAGE:[^\]]+\]/gi, '')
    .replace(/\[PARENT_REVIEW[^\]]*\]/gi, '')
    .trim();
  if (!cleanText) return;
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'zh-TW';
  utterance.rate = 0.88;
  utterance.pitch = 1.15;
  const voices = cachedVoices.length > 0
    ? cachedVoices
    : window.speechSynthesis.getVoices();
  const twVoice =
    voices.find(v => /meijia|美佳/i.test(v.name)) ||
    voices.find(v => v.lang === 'zh-TW' && v.name.toLowerCase().includes('google')) ||
    voices.find(v => v.lang === 'zh-TW') ||
    voices.find(v => v.lang.startsWith('zh'));
  if (twVoice) utterance.voice = twVoice;
  // Watchdog：iOS 凍結時強制結束（估算：每字 200ms + 5s buffer，最少 20s）
  const watchdogMs = Math.max(20000, cleanText.length * 200 + 5000);
  const watchdog = setTimeout(() => {
    if (isSpeaking) {
      window.speechSynthesis.cancel();
      setTTSSpeaking(false);
      stopTTSKeepAlive();
    }
  }, watchdogMs);
  utterance.onstart = () => { setTTSSpeaking(true); startTTSKeepAlive(); };
  utterance.onend   = () => { clearTimeout(watchdog); setTTSSpeaking(false); stopTTSKeepAlive(); };
  utterance.onerror = () => { clearTimeout(watchdog); setTTSSpeaking(false); stopTTSKeepAlive(); };
  window.speechSynthesis.speak(utterance);
}

// ══════════════════════════════════════════════════
// ── FIX 2：語音輸入 — Interim results 累積 ──
// 問題：interimResults:false + 提前 stop = 無結果
// 解法：interimResults:true，持續累積 interimText，
//        onend 時直接用累積內容送出，不等 final。
// ══════════════════════════════════════════════════
let interimText = '';      // 已確認的 final 文字
let lastInterimChunk = ''; // 最後一批尚未 final 的 interim 文字

function toggleVoice() {
  // 如果 Wes 說話中，點一下停止
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    setTTSSpeaking(false);
    return;
  }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('此裝置不支援語音輸入，請切換文字模式');
    return;
  }
  if (isListening) {
    // 使用者主動停止：用 stop() 而非 abort()，stop() 仍會觸發 onresult
    recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;   // ← 關鍵：打開 interim

  interimText = '';
  lastInterimChunk = '';

  recognition.onstart = () => {
    isListening = true;
    const btn = document.getElementById('voice-btn');
    const hint = document.getElementById('voice-hint');
    const interim = document.getElementById('interim-display');
    btn.classList.add('listening');
    btn.textContent = '⏹';
    hint.textContent = '再點一下停止';
    hint.className = 'active';
    interim.textContent = '';
    interim.className = 'visible';
  };

  recognition.onresult = (e) => {
    let finalChunk = '';
    let currentInterim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalChunk += e.results[i][0].transcript;
      } else {
        currentInterim += e.results[i][0].transcript;
      }
    }
    if (finalChunk) {
      interimText += finalChunk;
      lastInterimChunk = '';
    } else {
      lastInterimChunk = currentInterim;
    }
    const display = document.getElementById('interim-display');
    display.textContent = interimText + lastInterimChunk;
  };

  recognition.onerror = (e) => {
    if (e.error !== 'aborted') showToast('沒有聽到，再試一次');
  };

  recognition.onend = () => {
    isListening = false;
    const btn = document.getElementById('voice-btn');
    const hint = document.getElementById('voice-hint');
    const interim = document.getElementById('interim-display');
    btn.classList.remove('listening');
    btn.textContent = '🎙️';
    hint.textContent = '點一下說話';
    hint.className = '';
    interim.className = '';   // 隱藏字幕
    interim.textContent = '';

    // final 文字優先，否則用最後一批 interim（自動停止時 final 可能未觸發）
    const textToSend = interimText.trim() || lastInterimChunk.trim();
    interimText = '';
    lastInterimChunk = '';
    if (textToSend) {
      handleVoiceResult(textToSend);
    }
  };

  recognition.start();
}

async function handleVoiceResult(transcript) {
  if (!transcript || isWaitingForResponse || !sessionActive) return;
  addMessage('wesley', transcript);
  messages.push({ role: 'user', content: transcript });

  showTyping();
  setProcessing(true);
  try {
    const response = await callClaude(messages);
    if (response) {
      const { clean, query } = parseImageTag(stripSystemTags(response));
      checkForFlags(response, transcript);
      messages.push({ role: 'assistant', content: response });
      const imageData = query ? await fetchImage(query) : null;
      addMessage('wes', clean.trim(), imageData);
      speakText(clean.trim());
    }
  } finally {
    hideTyping();
    setProcessing(false);
  }
}

// ── Misc ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const val = document.getElementById('text-input').value.trim();
  document.getElementById('send-btn').disabled = !val || isWaitingForResponse;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── 父端控制台：計時器長按 3 秒觸發 ──
// 設計理由：三連點在操作間隔寬鬆時 Wesley 也可能誤觸。
// 長按需要持續施力，四歲孩子不會自然做出這個動作。
// 視覺回饋（.arming 邊框）讓爸爸知道長按有在累積，鬆手不足 3 秒則取消。
const PARENT_HOLD_MS = 3000;
let parentHoldTimer = null;

function startParentHold() {
  document.getElementById('timer-display').classList.add('arming');
  parentHoldTimer = setTimeout(() => {
    document.getElementById('timer-display').classList.remove('arming');
    openParentPanel();
  }, PARENT_HOLD_MS);
}

function cancelParentHold() {
  clearTimeout(parentHoldTimer);
  document.getElementById('timer-display').classList.remove('arming');
}

// 桌機支援（mousedown / mouseup）
document.getElementById('timer-display').addEventListener('mousedown', startParentHold);
document.getElementById('timer-display').addEventListener('mouseup', cancelParentHold);
document.getElementById('timer-display').addEventListener('mouseleave', cancelParentHold);

// 觸控支援（touchstart / touchend）
document.getElementById('timer-display').addEventListener('touchstart', (e) => {
  e.preventDefault();
  startParentHold();
}, { passive: false });
document.getElementById('timer-display').addEventListener('touchend', cancelParentHold);
document.getElementById('timer-display').addEventListener('touchcancel', cancelParentHold);

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
